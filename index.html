<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yacht 360 Tour & Music</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100vh; }
        /* Маленькая подсказка сверху */
        #audio-status {
            position: absolute; bottom: 20px; left: 20px; color: white;
            z-index: 100; font-family: sans-serif; font-size: 12px;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="audio-status">Tap for sound 🔊</div>
    <div id="panorama"></div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        var viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "tour.jpg", // или tour.webp
            "autoLoad": true,
            "orientationOnByDefault": true
        });

        // Функция включения музыки при первом взаимодействии
        function startMusic() {
            var audio = document.getElementById('bg-music');
            audio.play().then(() => {
                // Если музыка запустилась, убираем надпись
                document.getElementById('audio-status').style.display = 'none';
                // Убираем слушатель, чтобы не запускать повторно
                window.removeEventListener('click', startMusic);
                window.removeEventListener('touchstart', startMusic);
            }).catch(error => {
                console.log("Автовоспроизведение заблокировано браузером");
            });
        }

        // Ждем клика или касания экрана от пользователя
        window.addEventListener('click', startMusic);
        window.addEventListener('touchstart', startMusic);
    </script>
</body>
</html>
